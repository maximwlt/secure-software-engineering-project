services:
  db:
    image: postgres
    env_file:
      - path: projekt/backend/.env
        required: true
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
  backend:
    build: ./projekt/backend
    depends_on:
      db:
        condition: service_healthy
    links:
      - "db:database"
    restart: on-failure