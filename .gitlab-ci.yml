stages:
  - build
  - test_backend
  - test_frontend
build-job:
  stage: build
  image: docker:24.0.5-cli
  services:
    - name: docker:24.0.5-dind
      alias: docker
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - touch projekt/.env
  script:
    - cd projekt
    - docker compose create --build
    - docker compose push
  after_script:
    - docker compose -f projekt/compose.yml down
backend-test:
  stage: test_backend
  image: docker:24.0.5-cli
  services:
    - name: docker:24.0.5-dind
      alias: docker
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    # start backend container, with modified entrypoint for testing
    - docker run --entrypoint /app/mvnw  --name backend "${CI_REGISTRY_IMAGE:-projekt}/backend:${CI_COMMIT_SHA:-local}" clean test
  after_script:
    - docker rm -f mailhog db backend
  frontend-test:
    stage: test_frontend
    image: node:25.2.1-alpine
    script:
      - cd projekt/frontend
      - npm install
      - npm run test run
