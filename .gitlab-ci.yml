stages:
  - build
  - test_backend
build-job:
  stage: build
  image: docker:24.0.5-cli
  services:
    - name: docker:24.0.5-dind
      alias: docker
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - touch projekt/.env
  script:
    - cd projekt
    - docker compose create
    - docker compose push
backend-test:
  stage: test_backend
  image: docker:24.0.5-cli
  services:
    - name: docker:24.0.5-dind
      alias: docker
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    # start database container, with env variables
    - docker run --env POSTGRES_USER=test_user --env POSTGRES_DB=test_db --env POSTGRES_PASSWORD=test_pw -d --name db postgres:18
    # start backend container, with modified entrypoint for testing and env variables
    - docker run --entrypoint /app/mvnw --env POSTGRES_USER=test_user --env POSTGRES_DB=test_db --env POSTGRES_PASSWORD=test_pw --env DB_URL=jdbc:postgresql://database:5432/test_db --env JWT_SECRET="$JWT_SECRET" --env REFRESH_TOKEN_HMAC_SECRET="$REFRESH_TOKEN_HMAC_SECRET" --link "db:database" --name backend "${CI_REGISTRY_IMAGE:-projekt}/backend:${CI_COMMIT_SHA:-local}" test

