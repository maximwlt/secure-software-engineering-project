
# Limit zones for rate limiting based on client IP address, with different limits for general requests, login attempts, and registration attempts
limit_req_zone $binary_remote_addr zone=global_limit:10m rate=10r/s; # Global limit for all requests
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m; # Limit for login attempts
limit_req_zone $binary_remote_addr zone=register_limit:10m rate=3r/m; # Limit for registration attempts

# Format for custom access logs with detailed information for monitoring and debugging
log_format detailed '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time '          # Response Time
                    'uct=$upstream_connect_time ' # Connect time to backend server
                    'urt=$upstream_response_time ' # Response t ime from backend server
                    'cs=$upstream_cache_status';  # Cache Hit/Miss


# Log only 429 Too Many Requests responses to a separate log file
map $status $log_429 {
    429     1;
    default 0;
}

server {
    listen 8080; # Port
    server_name localhost; # Domain

    # General performance and security settings
    client_body_timeout 10s; # Time limit for reading client request body
    client_header_timeout 10s; # Time limit for reading client request header
    keepalive_timeout 20s; # Time a connection will be kept open after the last request
    keepalive_requests 100; # Maximum number of requests that can be sent over a single keep-alive connection

    limit_req zone=global_limit burst=20 nodelay;
    limit_req_status 429;
    limit_req_log_level warn;

    # Logs
    access_log /var/log/nginx/access.log detailed;
    error_log /var/log/nginx/error.log warn;
    access_log /var/log/nginx/rate-limit.log detailed if=$log_429;

    # React/Vite Build
    root /usr/share/nginx/html;
    index index.html;

    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' https: 'unsafe-inline';
        style-src 'self' 'unsafe-inline';
        img-src 'self' https: data:;
        frame-src https://www.youtube-nocookie.com;
        connect-src 'self';
        object-src 'none';
        base-uri 'none';
        frame-ancestors 'none';
    " always;

    # Error handling
    error_page 429 = @rate_limit_exceeded;

    location @rate_limit_exceeded {
        add_header Retry-After 60 always; # Instructs the client to wait before retrying
        add_header Content-Type application/problem+json always;
        return 429 '{
            "title": "Too Many Requests",
            "status": 429,
            "detail": "You have exceeded the rate limit. Please try again later."
        }';
    }

    # Frontend-Routing (SPA)
    location = / {
        return 301 http://$host:$request_port/documents/public;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API -> Backend-Service im Docker-Netzwerk
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        limit_req_dry_run on;
        limit_req_log_level warn;

        location /api/auth/login {
           limit_req zone=login_limit burst=3 nodelay;
           limit_req_status 429;
        }

        location /api/auth/register {
           limit_req zone=register_limit burst=5 nodelay;
           limit_req_status 429;
        }

        location /api/auth/forgot-password {
           limit_req zone=register_limit burst=3 nodelay;
           limit_req_status 429;
        }

        location /api/auth/reset-password {
           limit_req zone=register_limit burst=5 nodelay;
           limit_req_status 429;
        }
    }
}
