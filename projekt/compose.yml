services:
  db:
    image: postgres:18
    env_file: "backend/.env"
#      - path: "backend/.env"
#        required: true
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
  backend:
    build: backend
    depends_on:
      db:
        condition: service_healthy
    links:
      - "db:database"
    restart: on-failure
  frontend:
    build: frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8080:80"