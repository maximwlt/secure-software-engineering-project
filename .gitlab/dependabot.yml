version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/projekt"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: "scope"
    assignees:
      - "@kalt09"
  - package-ecosystem: maven
    directory: /projekt/backend
    schedule:
      interval: daily
  - package-ecosystem: npm
    directory: /projekt/frontend
    schedule:
      interval: daily