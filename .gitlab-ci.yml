stages:
  - build
  - test_backend
#  - push
image: docker:24.0.5-cli
services:
  - name: docker:24.0.5-dind
    alias: docker
    command: ["--storage-driver=overlay2"]
    volumes:
      - docker-dind-${CI_PROJECT_ID}:/var/lib/docker
build-job:
  stage: build
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - touch projekt/.env
#    - mkdir projekt/app
  script:
    - cd projekt
    - docker compose create
    - docker compose push
#    - docker save -o app/frontend.tar "${CI_REGISTRY_IMAGE:-projekt}/frontend:${CI_COMMIT_SHA:-local}"
#    - docker save -o app/backend.tar "${CI_REGISTRY_IMAGE:-projekt}/backend:${CI_COMMIT_SHA:-local}"
#  artifacts:
#    paths:
#      - projekt/app
backend-test:
  stage: test_backend
  needs:
    - build-job
  variables:
    POSTGRES_USER: test_user
    POSTGRES_DB: test_db
    POSTGRES_PASSWORD: test_pw

    DB_URL: jdbc:postgresql://database:5432/test_db

    JWT_SECRET: $JWT_SECRET

    REFRESH_TOKEN_HMAC_SECRET: $REFRESH_TOKEN_HMAC_SECRET

    MAIL_HOST: mailhog
    MAIL_PORT: 1025
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
#    - docker load -i projekt/app/backend.tar
  script:
    - docker run -p 8025:8025 -p 1025:1025 -d --name mailhog mailhog/mailhog:v1.0.1
    # start database container, with env variables
    - docker run --env POSTGRES_USER --env POSTGRES_DB --env POSTGRES_PASSWORD -d --name db postgres:18
    # start backend container, with modified entrypoint for testing and env variables
    - docker run --entrypoint /app/mvnw --env POSTGRES_USER --env POSTGRES_DB --env POSTGRES_PASSWORD --env DB_URL --env MAIL_HOST --env MAIL_PORT --env JWT_SECRET --env REFRESH_TOKEN_HMAC_SECRET --link "db:database" --link "mailhog:mailhog" --name backend "${CI_REGISTRY_IMAGE:-projekt}/backend:${CI_COMMIT_SHA:-local}" test
