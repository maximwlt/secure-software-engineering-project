name: dev-workflow.yml

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]

jobs:

  # ── BACKEND TEST ──
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run backend tests
        working-directory: projekt/backend
        run: ./mvnw clean test

  # ── FRONTEND TEST ──
  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: projekt/frontend/package-lock.json

      - name: Install NPM Dependencies
        working-directory: projekt/frontend
        run: npm ci

      - name: Run NPM Tests
        working-directory: projekt/frontend
        run: npm run test:ci


  # ── BUILD & PUSH ──
  build-job:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Creating .env file
        run: |
          echo "JWT_SECRET=${{secrets.JWT_SECRET}}" >> projekt/.env
          echo "REFRESH_TOKEN_HMAC_SECRET=${{secrets.REFRESH_TOKEN_SECRET_HMAC}}" >> projekt/.env

      - name: Login to Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push via Docker Compose
        working-directory: projekt
        env:
          REGISTRY: ghcr.io/${{ github.repository }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker compose -f docker-compose.dev.yml build
          docker compose -f docker-compose.dev.yml push

      - name: Cleanup
        if: always()
        working-directory: projekt
        run: docker compose -f docker-compose.dev.yml down
